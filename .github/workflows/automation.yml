name: Automation Tests

on:

  push:

    branches:
      - main

  pull_request:


  workflow_dispatch:


jobs:

  test:

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code

        uses: actions/checkout@v4



      - name: Setup Java

        uses: actions/setup-java@v4

        with:

          distribution: 'temurin'

          java-version: '21'



      - name: Cache Maven

        uses: actions/cache@v4

        with:

          path: ~/.m2

          key: maven-cache



      - name: Run tests

        run: mvn clean test



      - name: Upload reports

        uses: actions/upload-artifact@v4

        with:

          name: automation-reports

          path: |
            reports/
            csv/
            pdf/
            allure-results/